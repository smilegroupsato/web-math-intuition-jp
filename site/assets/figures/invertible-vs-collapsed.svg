<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 420" role="img" aria-labelledby="title desc">
  <title id="title">戻せる変換と戻せない変換</title>
  <desc id="desc">正則な変換では格子が潰れず戻せるが、射影のような変換では方向が潰れて戻せないことを示す図</desc>
  <rect width="840" height="420" fill="#fffaf1"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#385f9f"/></marker>
  </defs>
  <text x="80" y="42" font-family="serif" font-size="26" fill="#18202f">戻せる変換</text>
  <text x="500" y="42" font-family="serif" font-size="26" fill="#18202f">戻せない変換</text>
  <g transform="translate(80,88)">
    <path d="M0 240H260 M0 200H260 M0 160H260 M0 120H260 M0 80H260 M0 40H260" stroke="#eadcc5"/>
    <path d="M0 0V260 M40 0V260 M80 0V260 M120 0V260 M160 0V260 M200 0V260 M240 0V260" stroke="#eadcc5"/>
    <path d="M0 260H260 M0 260V0" stroke="#d8c7aa"/>
    <path d="M35 225 L160 145" stroke="#385f9f" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M0 260 L95 260 L160 145 L65 145 Z" fill="rgba(56,95,159,.12)" stroke="#385f9f" stroke-width="3"/>
    <text x="30" y="296" font-family="sans-serif" font-size="17" fill="#18202f">平行四辺形の面積が残る</text>
    <text x="52" y="322" font-family="sans-serif" font-size="17" fill="#385f9f">det A ≠ 0</text>
  </g>
  <path d="M352 210 C390 180 420 180 452 210" stroke="#385f9f" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <text x="384" y="172" font-family="serif" font-size="24" fill="#385f9f">A</text>
  <g transform="translate(500,88)">
    <path d="M0 240H260 M0 200H260 M0 160H260 M0 120H260 M0 80H260 M0 40H260" stroke="#eadcc5"/>
    <path d="M0 260H260 M0 260V0" stroke="#d8c7aa"/>
    <path d="M30 200 H225" stroke="#8f4a3a" stroke-width="6"/>
    <circle cx="74" cy="200" r="6" fill="#8f4a3a"/><circle cx="130" cy="200" r="6" fill="#8f4a3a"/><circle cx="190" cy="200" r="6" fill="#8f4a3a"/>
    <path d="M74 60 V200 M130 85 V200 M190 40 V200" stroke="#8f4a3a" stroke-width="2.5" stroke-dasharray="7 6"/>
    <text x="20" y="296" font-family="sans-serif" font-size="17" fill="#18202f">別々の点が同じ線上へ潰れる</text>
    <text x="74" y="322" font-family="sans-serif" font-size="17" fill="#8f4a3a">det A = 0</text>
  </g>
</svg>
