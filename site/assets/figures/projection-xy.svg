<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" role="img" aria-labelledby="title desc">
  <title id="title">射影 P(x,y,z)=(x,y)</title>
  <desc id="desc">三次元点がxy平面へ射影される図</desc>
  <rect width="760" height="460" fill="#fffaf1"/>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#385f9f"/></marker></defs>
  <g transform="translate(160,330)">
    <path d="M0 0 L420 0 L560 -110 L140 -110 Z" fill="rgba(185,150,93,.12)" stroke="#b9965d" stroke-width="2"/>
    <path d="M0 0 L420 0" stroke="#333"/><path d="M0 0 L140 -110" stroke="#333"/><path d="M0 0 L0 -250" stroke="#333"/>
    <text x="430" y="16" font-family="serif" font-size="22">x</text><text x="145" y="-120" font-family="serif" font-size="22">y</text><text x="-24" y="-255" font-family="serif" font-size="22">z</text>
    <circle cx="310" cy="-190" r="7" fill="#385f9f"/><text x="325" y="-195" font-family="serif" font-size="22" fill="#385f9f">(x,y,z)</text>
    <circle cx="310" cy="-70" r="7" fill="#b9965d"/><text x="325" y="-62" font-family="serif" font-size="22" fill="#9b7443">(x,y)</text>
    <path d="M310 -185 L310 -78" stroke="#385f9f" stroke-width="4" stroke-dasharray="8 6" marker-end="url(#arrow)"/>
  </g>
  <text x="230" y="52" font-family="serif" font-size="28" fill="#18202f">P(x,y,z) = (x,y)</text>
  <text x="220" y="86" font-family="sans-serif" font-size="18" fill="#7b5a2f">z成分を捨て、xy平面へ落とす</text>
</svg>
