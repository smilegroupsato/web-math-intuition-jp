name: Audit unlinked site HTML files

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/audit-unlinked-site-files.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Audit site HTML reachability from index.html
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          from urllib.parse import urlparse, unquote
          from collections import deque

          site = Path('site')
          report_dir = Path('reports')
          report_dir.mkdir(exist_ok=True)
          report = report_dir / 'unlinked-site-files.md'

          html_files = {p.relative_to(site).as_posix() for p in site.glob('*.html')}
          href_re = re.compile(r'href=["\']([^"\']+)["\']')

          def local_html_links(relpath: str):
              path = site / relpath
              if not path.exists():
                  return set()
              text = path.read_text(encoding='utf-8', errors='ignore')
              out = set()
              for href in href_re.findall(text):
                  href = href.strip()
                  if not href or href.startswith(('http://', 'https://', 'mailto:', 'tel:', '#')):
                      continue
                  parsed = urlparse(href)
                  target = unquote(parsed.path)
                  if not target:
                      continue
                  if target.endswith('/'):
                      target += 'index.html'
                  if target in html_files:
                      out.add(target)
              return out

          reachable = set()
          queue = deque(['index.html'] if 'index.html' in html_files else [])
          while queue:
              current = queue.popleft()
              if current in reachable:
                  continue
              reachable.add(current)
              for nxt in sorted(local_html_links(current)):
                  if nxt not in reachable:
                      queue.append(nxt)

          unlinked = sorted(html_files - reachable)
          missing_targets = []
          for relpath in sorted(html_files):
              path = site / relpath
              text = path.read_text(encoding='utf-8', errors='ignore')
              for href in href_re.findall(text):
                  parsed = urlparse(href.strip())
                  target = unquote(parsed.path)
                  if target.endswith('.html') and not target.startswith(('http://', 'https://')) and target not in html_files:
                      missing_targets.append((relpath, target))

          lines = []
          lines.append('# site/ HTML reachability audit')
          lines.append('')
          lines.append('Starting point: `site/index.html`')
          lines.append('')
          lines.append('## All HTML files in site/')
          for f in sorted(html_files):
              lines.append(f'- `{f}`')
          lines.append('')
          lines.append('## Reachable from index.html')
          for f in sorted(reachable):
              lines.append(f'- `{f}`')
          lines.append('')
          lines.append('## Not reachable from index.html')
          if unlinked:
              for f in unlinked:
                  lines.append(f'- `{f}`')
          else:
              lines.append('- None')
          lines.append('')
          lines.append('## Links pointing to missing HTML files')
          if missing_targets:
              for src, target in missing_targets:
                  lines.append(f'- `{src}` -> `{target}`')
          else:
              lines.append('- None')
          lines.append('')
          report.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print(report.read_text(encoding='utf-8'))
          PY

      - name: Commit audit report if changed
        run: |
          if git diff --quiet -- reports/unlinked-site-files.md; then
            echo "No audit report changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/unlinked-site-files.md
          git commit -m "Audit unlinked site HTML files"
          git push
