name: Normalize site header

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/normalize-site-header.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  normalize-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Normalize headers in all HTML files
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          header = '''<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="index.html">失われた数学的直観の回復<small>Recovering Mathematical Intuition</small></a>
    <nav class="nav">
      <a href="index.html">トップ</a>
      <a href="linear-algebra-01.html">線形代数</a>
      <a href="linear-vector.html">ベクトル</a>
      <a href="linear-equation-geometry.html">方程式と図形</a>
      <a href="linear-matrix-transform.html">行列と変換</a>
      <a href="linear-basis-coordinate.html">座標と基底</a>
      <a href="linear-active-passive-transform.html">能動/受動</a>
      <a href="linear-change-of-basis.html">基底変換</a>
      <a href="linear-origin-observer-relativity.html">原点</a>
      <a href="information-and-relation.html">情報と関係</a>
      <a href="relation-form-beyond-worldness.html">世界性</a>
      <a href="image-and-preimage-emotion.html">像と逆像</a>
    </nav>
  </div>
</header>'''

          pattern = re.compile(r'<header class="topbar">.*?</header>', re.S)
          changed = []
          for path in sorted(Path('site').glob('*.html')):
            text = path.read_text(encoding='utf-8')
            if '<header class="topbar"' not in text:
              continue
            new_text, count = pattern.subn(header, text, count=1)
            if count and new_text != text:
              path.write_text(new_text, encoding='utf-8')
              changed.append(str(path))

          print('Changed files:')
          for p in changed:
            print(p)
          PY

      - name: Commit header normalization if needed
        run: |
          if git diff --quiet -- site/*.html; then
            echo "No header changes needed."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add site/*.html
            git commit -m "Normalize site header navigation"
            git push
          fi

      - name: Deploy by FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./site/
          server-dir: ${{ secrets.SERVER_DIR }}
          log-level: minimal
