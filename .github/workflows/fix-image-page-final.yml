name: Fix image page
on:
  push:
    branches: [main]
    paths: ['.github/workflows/fix-image-page-final.yml']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix html
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('site/image-and-preimage-emotion.html')
          html = p.read_text(encoding='utf-8')
          html = html.replace('\\(z\n          e0\\)', r'\\(z\\ne0\\)')
          marker = '<div class="math-block">$$ F:X\\to Y $$</div>\n'
          figure = '''\n<figure class="figure-block">\n  <img src="assets/figures/image-preimage-map.svg" alt="像と逆像の関係図" loading="lazy" />\n  <figcaption>写像 F:X→Y における像 F(A) と逆像 F^{-1}(B) の関係。</figcaption>\n</figure>\n'''
          if 'image-preimage-map.svg' not in html and marker in html:
              html = html.replace(marker, marker + figure, 1)
          html = html.replace('Webページ最終更新日時：2026-06-08 13:25 JST', 'Webページ最終更新日時：2026-06-08 17:40 JST')
          html = html.replace('最終更新日時：2026-06-08 13:25 JST', '最終更新日時：2026-06-08 17:40 JST')
          p.write_text(html, encoding='utf-8')
          Path('.github/workflows/fix-image-page-final.yml').unlink()
          PY
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix image page figure placement" || exit 0
          git push
