name: Format information page HTML

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/format-information-page.yml'
      - '.github/scripts/move_annotation_notes.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Move generated annotation text into HTML
        run: python .github/scripts/move_annotation_notes.py

      - name: Format HTML with Prettier
        run: npx --yes prettier@3.4.2 --write site/information-and-relation.html site/image-and-preimage-emotion.html

      - name: Commit formatted HTML if needed
        run: |
          if git diff --quiet -- site/information-and-relation.html site/image-and-preimage-emotion.html site/assets/style.css; then
            echo "No formatting changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/information-and-relation.html site/image-and-preimage-emotion.html site/assets/style.css
          git commit -m "Move annotation notes into HTML"
          git push
