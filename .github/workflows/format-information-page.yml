name: Format information page HTML

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/format-information-page.yml'
      - '.github/scripts/move_annotation_notes.py'
      - '.github/scripts/fix_note_boxes_and_add_bayes.py'
      - '.github/scripts/fix_bayes_math_escapes.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Move generated annotation text into HTML
        run: python .github/scripts/move_annotation_notes.py

      - name: Fix note boxes and add Bayesian note
        run: python .github/scripts/fix_note_boxes_and_add_bayes.py

      - name: Fix Bayesian math escapes
        run: python .github/scripts/fix_bayes_math_escapes.py

      - name: Format HTML with Prettier
        run: npx --yes prettier@3.4.2 --write site/information-and-relation.html site/image-and-preimage-emotion.html site/linear-vector.html site/linear-basis-coordinate.html site/linear-equation-geometry.html

      - name: Commit formatted HTML if needed
        run: |
          if git diff --quiet -- site/information-and-relation.html site/image-and-preimage-emotion.html site/linear-vector.html site/linear-basis-coordinate.html site/linear-equation-geometry.html site/assets/style.css; then
            echo "No formatting changes needed."
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "actions@example.com"
          git add site/information-and-relation.html site/image-and-preimage-emotion.html site/linear-vector.html site/linear-basis-coordinate.html site/linear-equation-geometry.html site/assets/style.css
          git commit -m "Fix annotation note boxes and add Bayesian note"
          git push
