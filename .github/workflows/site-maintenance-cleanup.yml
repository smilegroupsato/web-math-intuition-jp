            <defs><marker id="blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#385f9f"/></marker><marker id="gold" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#b9965d"/></marker><marker id="red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#8f4a3a"/></marker></defs>
            <g transform="translate(120,360)">
              <g stroke="#eadcc5" stroke-width="1"><path d="M-60 0H560"/><path d="M0 60V-300"/><path d="M80 60V-300"/><path d="M160 60V-300"/><path d="M240 60V-300"/><path d="M320 60V-300"/><path d="M400 60V-300"/><path d="M480 60V-300"/><path d="M-60 -80H560"/><path d="M-60 -160H560"/><path d="M-60 -240H560"/></g>
              <path d="M-60 0H560" stroke="#d8c7aa"/><path d="M0 60V-300" stroke="#d8c7aa"/>
              <path d="M0 0 L80 0" stroke="#888" stroke-width="4" marker-end="url(#blue)"/><text x="82" y="24" font-family="serif" font-size="20" fill="#555">e1</text>
              <path d="M0 0 L0 -80" stroke="#888" stroke-width="4" marker-end="url(#blue)"/><text x="10" y="-82" font-family="serif" font-size="20" fill="#555">e2</text>
              <path d="M0 0 L80 -80" stroke="#b9965d" stroke-width="5" marker-end="url(#gold)"/><text x="86" y="-90" font-family="serif" font-size="22" fill="#9b7443">b1=(1,1)</text>
              <path d="M0 0 L80 80" stroke="#b9965d" stroke-width="5" marker-end="url(#gold)"/><text x="86" y="84" font-family="serif" font-size="22" fill="#9b7443">b2=(1,-1)</text>
              <path d="M0 0 L240 -80" stroke="#385f9f" stroke-width="5" marker-end="url(#blue)"/><circle cx="240" cy="-80" r="6" fill="#385f9f"/>
              <text x="250" y="-70" font-family="serif" font-size="24" fill="#385f9f">v</text>
              <path d="M0 0 L160 -160 L240 -80" stroke="#8f4a3a" stroke-width="2.5" stroke-dasharray="8 6" fill="none"/>
